<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buck2Bar - Budget Tracker</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 0;
        }
        .container-main {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 30px;
            margin-top: 40px;
            margin-bottom: 40px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .header h1 {
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }
        .header p {
            color: #666;
            font-size: 14px;
        }
        .nav-tabs .nav-link {
            color: #666;
            font-weight: 500;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }
        .nav-tabs .nav-link:hover {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        .nav-tabs .nav-link.active {
            color: #667eea;
            background-color: transparent;
            border-color: transparent;
            border-bottom-color: #667eea;
        }
        .month-row {
            margin-bottom: 25px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        .month-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }
        .input-group-text {
            background-color: #f0f0f0;
            font-weight: 500;
            color: #666;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-save {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-weight: 600;
            padding: 10px 30px;
            transition: all 0.3s ease;
        }
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            color: white;
        }
        .btn-clear {
            background-color: #dc3545;
            border: none;
            color: white;
            font-weight: 600;
            padding: 10px 30px;
            transition: all 0.3s ease;
        }
        .btn-clear:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(220, 53, 69, 0.4);
            color: white;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
            justify-content: center;
        }
        .chart-container {
            position: relative;
            height: 400px;
            margin-top: 30px;
        }
        .alert-feedback {
            margin-top: 15px;
            display: none;
        }
        .tab-content {
            margin-top: 30px;
        }
        .input-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            align-items: center;
        }
        .username-section {
            margin-bottom: 30px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        .username-section h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 16px;
            font-weight: 600;
        }
        .username-input-group {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        .username-input-wrapper {
            flex: 1;
        }
        #usernameInput {
            margin-bottom: 8px;
        }
        .validation-feedback {
            font-size: 13px;
            margin-bottom: 10px;
            display: none;
        }
        .validation-feedback.error {
            color: #dc3545;
            display: block;
        }
        .validation-feedback.success {
            color: #28a745;
            display: block;
        }
        .validation-requirement {
            font-size: 12px;
            padding: 4px 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .validation-requirement.met {
            color: #28a745;
        }
        .validation-requirement.unmet {
            color: #ccc;
        }
        .requirement-check {
            font-weight: bold;
        }
        .btn-submit {
            background-color: #ff69b4;
            border: none;
            color: white;
            font-weight: 600;
            padding: 10px 30px;
            transition: all 0.3s ease;
            height: fit-content;
        }
        .btn-submit:hover {
            background-color: #ff1493;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 105, 180, 0.4);
            color: white;
        }
        .btn-submit:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        @media (max-width: 768px) {
            .input-wrapper {
                grid-template-columns: 1fr;
            }
            .container-main {
                padding: 20px;
            }
            .button-group {
                flex-direction: column;
            }
            .username-input-group {
                flex-direction: column;
            }
            .btn-submit {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container-main" style="max-width: 900px; margin-left: auto; margin-right: auto;">
        <div class="header">
            <h1>💰 Buck2Bar</h1>
            <p>Track your monthly income and expenses at a glance</p>
        </div>

        <!-- Username Section -->
        <div class="username-section">
            <h3>Create Your Account</h3>
            <div class="username-input-group">
                <div class="username-input-wrapper">
                    <input type="text" id="usernameInput" class="form-control" placeholder="Enter your username">
                    <div id="validationFeedback" class="validation-feedback"></div>
                    <div id="requirementsList">
                        <div class="validation-requirement unmet" id="req-length">
                            <span class="requirement-check">✓</span> At least 8 characters
                        </div>
                        <div class="validation-requirement unmet" id="req-uppercase">
                            <span class="requirement-check">✓</span> At least 1 uppercase letter
                        </div>
                        <div class="validation-requirement unmet" id="req-number">
                            <span class="requirement-check">✓</span> At least 1 number
                        </div>
                        <div class="validation-requirement unmet" id="req-special">
                            <span class="requirement-check">✓</span> At least 1 special character
                        </div>
                    </div>
                </div>
                <button type="button" class="btn btn-submit" id="submitBtn" disabled>Submit</button>
            </div>
        </div>

        <!-- Tab Navigation -->
        <ul class="nav nav-tabs" id="mainTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="data-tab" data-bs-toggle="tab" data-bs-target="#data-content" 
                    type="button" role="tab" aria-controls="data-content" aria-selected="true">
                    📊 Data Entry
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="chart-tab" data-bs-toggle="tab" data-bs-target="#chart-content" 
                    type="button" role="tab" aria-controls="chart-content" aria-selected="false">
                    📈 Chart
                </button>
            </li>
        </ul>

        <!-- Tab Content -->
        <div class="tab-content" id="mainTabContent">
            <!-- Data Tab -->
            <div class="tab-pane fade show active" id="data-content" role="tabpanel" aria-labelledby="data-tab">
                <form id="dataForm">
                    <div id="monthsContainer"></div>
                    
                    <div id="feedbackAlert" class="alert alert-feedback" role="alert"></div>
                    
                    <div class="button-group">
                        <button type="button" class="btn btn-save" id="saveBtn">Save Data</button>
                        <button type="button" class="btn btn-clear" id="clearBtn">Clear All</button>
                    </div>
                </form>
            </div>

            <!-- Chart Tab -->
            <div class="tab-pane fade" id="chart-content" role="tabpanel" aria-labelledby="chart-tab">
                <div class="chart-container">
                    <canvas id="incomeExpenseChart"></canvas>
                </div>
                <div class="button-group">
                    <button type="button" class="btn btn-save" id="downloadChartBtn">⬇️ Download as PNG</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Script -->
    <script src="script.js"></script>
</body>
</html>
